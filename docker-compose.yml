services:

  mongo:
    image: mongo:7.0
    container_name: incident-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: incident-tracker
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - incident-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/incident-tracker --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incident-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/incident-tracker
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - incident-network
    healthcheck:
      test: wget -qO- http://localhost:5000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo-data:
    driver: local

networks:
  incident-network:
    driver: bridge